name: Daily Gmarket Best Crawler

on:
  schedule:
    - cron: "0 21 * * *"  # KST 06:00 = UTC 21:00 (전날)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke test Gmarket crawler
        run: python gmarket_best_crawler.py --max-categories 1 --max-items 5 --mode auto --skip-detail-pages

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmarket-best-zip
          path: output/*.zip
          if-no-files-found: error
          retention-days: 14
